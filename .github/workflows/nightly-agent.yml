name: OKC Calendar Agent

on:
  schedule:
    # 2 AM Central = 8 AM UTC (7 AM UTC during daylight saving)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      monday_report:
        description: "Force Monday report"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js (for JS syntax checking)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect Monday & set env
        run: |
          DAY=$(date +%A)
          echo "Today is $DAY"
          if [ "$DAY" = "Monday" ] || [ "${{ github.event.inputs.monday_report }}" = "true" ]; then
            echo "IS_MONDAY=true" >> $GITHUB_ENV
            echo "Monday mode: ON"
          else
            echo "IS_MONDAY=false" >> $GITHUB_ENV
          fi

      - name: Run OKC Calendar Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IS_MONDAY: ${{ env.IS_MONDAY }}
        run: |
          python okc_calendar_agent.py

      - name: Verify output
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found after agent run"
            exit 1
          fi

          SIZE=$(wc -c < index.html)
          echo "index.html size: $SIZE bytes"

          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: index.html seems too small ($SIZE bytes) — possible corruption"
            exit 1
          fi

          # Check for duplicate body tags (duplication bug guard)
          BODY_COUNT=$(grep -c "<body" index.html || true)
          if [ "$BODY_COUNT" -gt 1 ]; then
            echo "ERROR: index.html has $BODY_COUNT <body> tags — file is duplicated"
            exit 1
          fi

          # Basic JS syntax check on the event arrays
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            // Check that LIVE_EVENTS block is valid JS
            const match = html.match(/var LIVE_EVENTS = (\[[\s\S]*?\]);/);
            if (match) {
              try {
                eval('(' + match[1] + ')');
                console.log('✓ LIVE_EVENTS JS syntax OK');
              } catch(e) {
                console.error('ERROR: LIVE_EVENTS has invalid JS:', e.message);
                process.exit(1);
              }
            } else {
              console.log('No LIVE_EVENTS block found (might be first run with no new events)');
            }
          "

          echo "✓ index.html looks healthy ($SIZE bytes, $BODY_COUNT body tag)"

      - name: Check if files changed
        id: diff
        run: |
          if git diff --quiet index.html agent_log.json 2>/dev/null || \
             git diff --quiet index.html 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected — will commit"
            # Show a summary of what changed
            ADDED=$(git diff index.html | grep -c '^+.*name:"' || true)
            REMOVED=$(git diff index.html | grep -c '^-.*name:"' || true)
            echo "Approximate event diff: +$ADDED / -$REMOVED"
          fi

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "OKC Calendar Agent"
          git config user.email "agent@okc-calendar.github.io"

          git add index.html agent_log.json

          # Build commit message
          DATE=$(date "+%B %d, %Y")
          if [ "$IS_MONDAY" = "true" ]; then
            git commit -m "🗓️ Weekly update — $DATE [Monday report]"
          else
            git commit -m "🗓️ Nightly update — $DATE"
          fi

          git push

      - name: No changes — still log
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "Calendar is up to date — no new events found tonight"

      - name: Write step summary (always)
        if: always()
        run: |
          echo "## OKC Calendar Agent Run — $(date '+%B %d, %Y')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f agent_log.json ]; then
            LAST_RUN=$(python3 -c "
          import json
          try:
              logs = json.load(open('agent_log.json'))
              last = logs[-1] if logs else {}
              diff = last.get('diff', {})
              print(f\"- Sources run: {last.get('sources_run','?')}\")
              print(f\"- New events added: +{diff.get('added',0)}\")
              print(f\"- Failed sources: {len(last.get('failed_sources', []))}\")
              if last.get('failed_sources'):
                  for s in last['failed_sources']:
                      print(f\"  - {s}\")
              val = last.get('validation', {})
              status = 'PASSED' if val.get('passed', True) else 'FAILED'
              print(f\"- Validation: {status}\")
          except Exception as e:
              print(f'Could not read log: {e}')
          ")
            echo "$LAST_RUN" >> $GITHUB_STEP_SUMMARY
          fi
